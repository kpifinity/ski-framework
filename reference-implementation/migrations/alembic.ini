# Alembic configuration for the SKI Framework reference implementation.
# See reference-implementation/migrations/README.md.

[alembic]
script_location = reference-implementation/migrations
prepend_sys_path = .

# DSN is read from the LEDGER_DSN env var by env.py (not from this file).
# Leaving sqlalchemy.url blank intentionally; env.py overrides it.
sqlalchemy.url =

# Use UTC for timestamps in migration filenames.
timezone = UTC

# Truncate slugs at 40 chars so filenames stay readable.
truncate_slug_length = 40

# Don't pre-render migrations in a transaction (Postgres handles this; some
# DDL — partitions, triggers — needs its own control).
transaction_per_migration = true

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S
