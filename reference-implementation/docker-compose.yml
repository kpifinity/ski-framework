version: '3.8'

# ============================================================================
# SKI Framework Reference Implementation — Sovereign by Default
# ============================================================================
# This stack runs entirely on-premise. No cloud API calls during runtime.
# Inference is performed by a local SKI Model (Ollama backend) operating
# inside the sovereign boundary.
#
# STATUS: EARLY ALPHA — not production ready. See README.md.
# ============================================================================

services:

  # --------------------------------------------------------------------------
  # Local LLM runtime (Ollama) — provides the SKI Model inference backend.
  # Runs entirely offline once the model has been pulled at provisioning time.
  # --------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:0.3.12
    container_name: ski-ollama
    # No host port published by default — the SKI Model is the only client.
    # Uncomment for local debugging on host 11434.
    # ports:
    #   - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - ski-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # --------------------------------------------------------------------------
  # SKI Model service — the v3 runtime. Scopes the signed KG to the
  # measurement's jurisdiction + effective date, evaluates via the local
  # LLM (temperature=0, structured generation), and independently
  # cross-checks every formalizable assertion with the Symbolic Verifier.
  # --------------------------------------------------------------------------
  ski-model:
    build:
      context: .
      dockerfile: Dockerfile.ski-model
    container_name: ski-model
    ports:
      - "8000:8000"
    environment:
      # Inference backend — local by default. "anthropic" is a non-conformant
      # demo mode and disqualifies the deployment from any conformance level.
      SKI_INFERENCE_BACKEND: ${SKI_INFERENCE_BACKEND:-ollama}
      SKI_MODEL_NAME: ${SKI_MODEL_NAME:-qwen2.5:7b-instruct}
      SKI_MODEL_TEMPERATURE: "0"
      SKI_MODEL_SEED: "${SKI_MODEL_SEED:-42}"
      SKI_MODEL_MAX_TOKENS: ${SKI_MODEL_MAX_TOKENS:-512}
      SKI_MODEL_FILE_SHA256: ${SKI_MODEL_FILE_SHA256:-}
      OLLAMA_BASE_URL: http://ollama:11434
      KG_PATH: /app/kg/kg.json
      KG_REQUIRE_SIGNATURE: ${KG_REQUIRE_SIGNATURE:-true}
      LEDGER_DSN: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-ski_ledger}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TLS_ENABLED: ${TLS_ENABLED:-true}
      API_KEY: ${SKI_API_KEY:?SKI_API_KEY is required — generate one with `openssl rand -hex 32`}
      DETERMINISM_CANARY_INTERVAL: ${DETERMINISM_CANARY_INTERVAL:-300}
    volumes:
      - ./examples/knowledge-graphs:/app/kg:ro
      - ski-model-data:/data
      - ./tls:/app/tls:ro
    networks:
      - ski-internal
    depends_on:
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "--cacert", "/app/tls/ca.crt", "https://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # --------------------------------------------------------------------------
  # Sidecar — passive, read-only telemetry intake. Forwards normalized
  # records to the SKI Model. Does not perform tag inference.
  # --------------------------------------------------------------------------
  sidecar:
    build:
      context: .
      dockerfile: Dockerfile.sidecar
    container_name: ski-sidecar
    environment:
      SKI_MODEL_ENDPOINT: https://ski-model:8000
      SKI_MODEL_API_KEY: ${SKI_API_KEY:?SKI_API_KEY is required}
      SKI_MODEL_CA_CERT: /app/tls/ca.crt
      TELEMETRY_SOURCE: ${TELEMETRY_SOURCE:-file}
      TELEMETRY_BATCH_SIZE: ${TELEMETRY_BATCH_SIZE:-100}
      HEARTBEAT_INTERVAL: ${HEARTBEAT_INTERVAL:-60}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-operational-data}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./examples/telemetry:/data:ro
      - ./tls:/app/tls:ro
    networks:
      - ski-internal
    depends_on:
      - ski-model
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --------------------------------------------------------------------------
  # PostgreSQL — audit ledger storage. Append-only enforced at the database
  # layer via triggers (see src/ledger/schema.sql).
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:15.6-alpine
    container_name: ski-ledger-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ski_ledger}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — see SECURITY_DEFAULTS.md}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/ledger/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./src/ledger/append_only.sql:/docker-entrypoint-initdb.d/02-append-only.sql:ro
      # PR 15: also run the v3 transcript-columns migration on first init.
      # On fresh deployments the v3 baseline in schema.sql already provides
      # the columns and constraints; this migration is idempotent (every
      # ALTER is guarded with IF [NOT] EXISTS) so it is a no-op against a
      # clean v3 schema. It remains in tree for operators upgrading an
      # existing v0.2 ledger that has only the v2.1 baseline.
      - ./src/ledger/migrations/0002_transcript_columns.sql:/docker-entrypoint-initdb.d/03-transcript-columns.sql:ro
    networks:
      - ski-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # PostgreSQL Prometheus exporter — Postgres does not expose /metrics
  # natively. This sidecar publishes the metrics Prometheus scrapes.
  # --------------------------------------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: ski-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-ski_ledger}?sslmode=disable"
    networks:
      - ski-internal
    depends_on:
      - postgres
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Kafka (optional) — used when TELEMETRY_SOURCE=kafka. Authentication is
  # ENABLED by default; PLAINTEXT is disabled. See SECURITY_DEFAULTS.md.
  # --------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ski-kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: SASL_PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SASL_PLAINTEXT:SASL_PLAINTEXT
      KAFKA_SASL_ENABLED_MECHANISMS: SCRAM-SHA-256
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: SCRAM-SHA-256
      KAFKA_INTER_BROKER_LISTENER_NAME: SASL_PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/jaas.conf"
    volumes:
      - kafka-data:/var/lib/kafka/data
      - ./monitoring/kafka_jaas.conf:/etc/kafka/jaas.conf:ro
    networks:
      - ski-internal
    depends_on:
      - zookeeper
    restart: unless-stopped
    profiles: ["kafka"]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ski-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    volumes:
      - zookeeper-data:/var/lib/zookeeper
    networks:
      - ski-internal
    restart: unless-stopped
    profiles: ["kafka"]

  # --------------------------------------------------------------------------
  # Prometheus — operational metrics. Alert rules live in monitoring/rules/.
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: ski-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - ski-internal
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Grafana — dashboards. Admin password is mandatory; no default 'admin'.
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.1
    container_name: ski-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:?GRAFANA_USER is required}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required — see SECURITY_DEFAULTS.md}
      GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_PROTOCOL: ${GRAFANA_PROTOCOL:-https}
      GF_SERVER_CERT_FILE: /etc/grafana/certs/grafana.crt
      GF_SERVER_CERT_KEY: /etc/grafana/certs/grafana.key
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./tls/grafana:/etc/grafana/certs:ro
    networks:
      - ski-internal
    depends_on:
      - prometheus
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # pgAdmin — disabled by default. Enable via `--profile pgadmin`.
  # --------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:8.5
    container_name: ski-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-}
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - ski-internal
    depends_on:
      - postgres
    restart: unless-stopped
    profiles: ["pgadmin"]

volumes:
  ollama-models:
  ski-model-data:
  postgres-data:
  prometheus-data:
  grafana-data:
  pgadmin-data:
  kafka-data:
  zookeeper-data:

networks:
  # `ski-internal` has no external connectivity by design. The sovereign
  # boundary is enforced by docker network isolation plus host firewall rules
  # documented in SECURITY_DEFAULTS.md.
  ski-internal:
    driver: bridge
    internal: false  # set to true in air-gapped deployments
