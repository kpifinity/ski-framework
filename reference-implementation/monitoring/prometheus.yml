global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ski-framework'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'milm'
    static_configs:
      - targets: ['milm:8000']
    metrics_path: '/metrics'

  - job_name: 'sidecar'
    static_configs:
      - targets: ['sidecar:8001']
    metrics_path: '/metrics'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    metrics_path: '/metrics'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
