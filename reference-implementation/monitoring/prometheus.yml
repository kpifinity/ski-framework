global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ski-framework'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/rules/ski-alerts.yml

scrape_configs:
  - job_name: 'ski-model'
    static_configs:
      - targets: ['ski-model:8000']
    scheme: https
    tls_config:
      insecure_skip_verify: true  # demo deployment with self-signed certs
    metrics_path: '/metrics'

  - job_name: 'sidecar'
    static_configs:
      - targets: ['sidecar:8001']
    metrics_path: '/metrics'

  # Postgres does NOT expose /metrics natively. postgres-exporter does.
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
