# Prometheus alert rules — SKI-specific runtime invariants.
# Each alert maps directly to a v3.0 specification requirement.
#
# NOTE: the reference implementation does not yet export a /metrics
# endpoint; these rules define the metric-name contract for when
# instrumentation lands (tracked for v3.1). Until then, poll
# /api/canary (agreement-monitor snapshot) for liveness checks.

groups:
  - name: ski-agreement
    interval: 30s
    rules:
      - alert: SKIAgreementRateDegraded
        # Maps to: spec v3.0 — neuro-symbolic agreement monitor
        expr: ski_agreement_rate < 0.95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "LLM-verifier agreement rate below threshold"
          description: "The rolling agreement rate between the LLM evaluator and the Symbolic Verifier dropped below 0.95. Inspect recent verdicts for LLM_CONTRADICTION / NEURO_SYMBOLIC_DIVERGENCE statuses before processing more telemetry."

  - name: ski-sovereignty
    interval: 30s
    rules:
      - alert: SKIKnowledgeGraphSignatureFailed
        # Maps to: Phase 1 → Phase 2 boundary, KG signature requirement
        expr: ski_kg_signature_verified == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Loaded KG is unsigned or signature failed verification"
          description: "Refuse to evaluate any telemetry until a signed KG is loaded."

  - name: ski-ledger
    interval: 60s
    rules:
      - alert: SKILedgerSequenceGap
        # Maps to: B5.2 Audit Ledger hash-chain integrity
        expr: increase(ski_ledger_sequence_gaps_total[15m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Audit ledger sequence gap detected"
          description: "A gap in the sequence_number column was observed. Investigate immediately — this is an integrity-class incident."

  - name: ski-heartbeat
    interval: 30s
    rules:
      - alert: SKISidecarHeartbeatLost
        # Maps to: Sidecar gap-detection requirement
        expr: time() - ski_sidecar_last_telemetry_timestamp > 300
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Sidecar has not received telemetry for >5 minutes"
          description: "Investigate the upstream telemetry source and the sidecar→model connectivity."
