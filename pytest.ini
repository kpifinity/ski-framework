[pytest]
# SKI Framework pytest configuration

# Match the pyproject.toml test discovery pattern. The v3 runtime tests
# live under reference-implementation/src/ski_model/v3/tests and must be
# discovered by CI's `pytest -q --cov` invocation.
testpaths =
    conformance
    tools
    reference-implementation/src/ski_model/v3/tests

# Markers for conformance tests
markers =
    level1: Level 1 Foundational conformance tests
    level2: Level 2 Managed conformance tests
    level3: Level 3 Assured conformance tests
    requires_live_deployment: Test requires a running SKI Model endpoint
    requires_ledger: Test requires a Postgres ledger DSN

# Python file patterns for test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Strict marker checking
addopts = --strict-markers
