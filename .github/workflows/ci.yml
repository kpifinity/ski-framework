name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy reference-implementation/src tools conformance --ignore-missing-imports

  test:
    name: Unit tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pip install -e tools/kg-extractor -e tools/kg-validator -e tools/ski-model-deploy -e tools/audit-ledger
      - run: pytest -q --cov=. --cov-report=xml
      - uses: codecov/codecov-action@v4
        if: matrix.python == '3.11'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  conformance:
    name: SKI conformance tests (Level 1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pip install -e tools/audit-ledger -e tools/ski-model-deploy
      - run: pytest conformance/ -q -m "level1" --tb=short

  security:
    name: Security scans (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: bandit -r reference-implementation/src tools conformance scripts -ll --skip B101
      - run: pip-audit -r reference-implementation/src/ski_model/requirements.txt
                      -r reference-implementation/src/sidecar/requirements.txt
                      -r tools/kg-extractor/requirements.txt
                      -r tools/kg-validator/requirements.txt
                      -r tools/ski-model-deploy/requirements.txt
                      -r tools/audit-ledger/requirements.txt
                      -r requirements-dev.txt

  codeql:
    name: CodeQL (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install cyclonedx-bom==4.4.3
      - run: |
          for req in \
            reference-implementation/src/ski_model/requirements.txt \
            reference-implementation/src/sidecar/requirements.txt \
            tools/kg-extractor/requirements.txt \
            tools/kg-validator/requirements.txt \
            tools/ski-model-deploy/requirements.txt \
            tools/audit-ledger/requirements.txt; do
              name=$(echo "$req" | tr '/' '_')
              cyclonedx-py requirements -i "$req" -o "sbom-${name}.json"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-*.json

  container-scan:
    name: Trivy container scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build SKI Model image
        run: docker build -f reference-implementation/Dockerfile.ski-model -t ski-model:ci reference-implementation
      - name: Build Sidecar image
        run: docker build -f reference-implementation/Dockerfile.sidecar -t ski-sidecar:ci reference-implementation
      - uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ski-model:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      - uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ski-sidecar:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  commit-signatures:
    name: Commit signature verification
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify all PR commits are signed
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          bad=$(git log --format='%H %G?' "$base..$head" | awk '$2!="G" && $2!="U"' || true)
          if [ -n "$bad" ]; then
            echo "Unsigned or invalidly-signed commits found:"
            echo "$bad"
            exit 1
          fi
