name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  # ====================================================================
  # GATING — these must pass.
  # ====================================================================

  conformance:
    name: SKI conformance tests (Level 1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pip install -e tools/audit-ledger -e tools/ski-model-deploy
      - run: pytest conformance/ -q -m "level1 or level2" --tb=short

  codeql:
    name: CodeQL (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3

  # ====================================================================
  # ADVISORY — informational for the alpha. Tighten before v1.0.
  # See pyproject.toml for the tooling configuration that scopes each
  # check to the rewritten v2.1 packages and treats legacy code leniently.
  # ====================================================================

  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy

  test:
    name: Unit tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pip install -e tools/kg-extractor -e tools/kg-validator -e tools/ski-model-deploy -e tools/audit-ledger
      - run: pytest -q --cov --cov-report=xml
      - uses: codecov/codecov-action@v4
        if: matrix.python == '3.11'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  security:
    name: Security scans (bandit + pip-audit)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Bandit (scoped to new v2.1 packages)
        run: |
          bandit -r reference-implementation/src/ski_model \
                    reference-implementation/src/symbolic_evaluator \
                    reference-implementation/src/tag_registry \
                    tools/audit-ledger/src \
                    tools/ski-model-deploy/src \
                    conformance \
                    -ll --skip B101,B404,B603,B607
      - name: pip-audit (best-effort across requirements files)
        run: |
          set +e
          fail=0
          for req in \
            requirements-dev.txt \
            reference-implementation/src/ski_model/requirements.txt \
            reference-implementation/src/sidecar/requirements.txt \
            tools/kg-extractor/requirements.txt \
            tools/kg-validator/requirements.txt \
            tools/ski-model-deploy/requirements.txt \
            tools/audit-ledger/requirements.txt; do
              echo "--- $req"
              pip-audit -r "$req" || fail=1
          done
          exit $fail

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install "cyclonedx-bom==4.4.3"
      - name: Generate SBOM per requirements file
        run: |
          set -e
          mkdir -p sbom
          for req in \
            reference-implementation/src/ski_model/requirements.txt \
            reference-implementation/src/sidecar/requirements.txt \
            tools/kg-extractor/requirements.txt \
            tools/kg-validator/requirements.txt \
            tools/ski-model-deploy/requirements.txt \
            tools/audit-ledger/requirements.txt; do
              name=$(echo "$req" | tr '/' '_')
              # cyclonedx-py requirements takes the requirements file as
              # a POSITIONAL argument (not -i).
              cyclonedx-py requirements -o "sbom/sbom-${name}.json" "$req" || true
          done
          ls -la sbom/
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/

  container-scan:
    name: Trivy container scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Build SKI Model image
        run: docker build -f reference-implementation/Dockerfile.ski-model -t ski-model:ci reference-implementation
      - name: Build Sidecar image
        run: docker build -f reference-implementation/Dockerfile.sidecar -t ski-sidecar:ci reference-implementation
      # trivy-action is pinned by commit SHA, not by tag — upstream had a
      # supply-chain incident in early 2026 and now signs releases with the
      # `v` prefix. SHA pinning protects against tag re-pointing. Bump via
      # dependabot; when bumping, also update the `# v...` comment.
      - name: Trivy scan — SKI Model
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ski-model:ci
          severity: HIGH,CRITICAL
          exit-code: "0"             # advisory
          ignore-unfixed: true
      - name: Trivy scan — Sidecar
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ski-sidecar:ci
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: true

  commit-signatures:
    name: Commit signature verification
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify all PR commits are signed
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          bad=$(git log --format='%H %G?' "$base..$head" | awk '$2!="G" && $2!="U"' || true)
          if [ -n "$bad" ]; then
            echo "Unsigned or invalidly-signed commits found:"
            echo "$bad"
            exit 1
          fi
