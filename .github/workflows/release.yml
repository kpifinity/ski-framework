name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pip install cyclonedx-bom==4.4.3 build

      - name: Generate SBOMs
        run: |
          mkdir -p dist/sbom
          for req in \
            reference-implementation/src/ski_model/requirements.txt \
            reference-implementation/src/sidecar/requirements.txt \
            tools/kg-extractor/requirements.txt \
            tools/kg-validator/requirements.txt \
            tools/ski-model-deploy/requirements.txt \
            tools/audit-ledger/requirements.txt; do
              name=$(echo "$req" | tr '/' '_')
              # cyclonedx-py requirements takes the requirements file as
              # a POSITIONAL argument (not -i).
              cyclonedx-py requirements -o "dist/sbom/sbom-${name}.json" "$req" || true
          done
          ls -la dist/sbom/

      - name: Build sdists/wheels for tools
        run: |
          for tool in kg-extractor kg-validator ski-model-deploy audit-ledger; do
            (cd tools/$tool && python -m build --outdir ../../dist/)
          done

      - name: GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**
          generate_release_notes: true
