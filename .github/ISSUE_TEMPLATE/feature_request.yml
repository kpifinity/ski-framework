name: Feature request
description: Suggest an enhancement to the reference implementation, tools, or conformance suite.
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Who has it?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: spec
    attributes:
      label: Specification linkage
      description: Which sections of the SKI Framework v3.0 specification does this touch? Or is it purely an implementation concern?
  - type: textarea
    id: conformance
    attributes:
      label: Conformance impact
      description: Would this need a new conformance test? Would it change existing ones?
