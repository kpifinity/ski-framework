name: Bug report
description: Something doesn't work as documented.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. **Do not file security vulnerabilities here**
        — use the security advisory link in the template chooser.
  - type: input
    id: version
    attributes:
      label: SKI Framework version
      placeholder: "v3.1.0-alpha.2 (commit abcdef1)"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - reference-implementation / SKI Model service
        - reference-implementation / Symbolic Evaluator
        - reference-implementation / Tag Registry
        - reference-implementation / Sidecar
        - reference-implementation / audit ledger
        - tools / kg-extractor
        - tools / kg-validator
        - tools / ski-model-deploy
        - tools / audit-ledger
        - conformance suite
        - scripts
        - documentation (docs/)
        - other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Include exact commands, error messages, and stack traces.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: "1. … 2. … 3. …"
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: |
        - OS / kernel:
        - Python version:
        - Docker / docker-compose version:
        - Inference backend (ollama / vllm / llama_cpp / anthropic-demo):
        - SKI_MODEL_NAME:
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I am not reporting a security vulnerability via this issue.
          required: true
        - label: I have searched existing issues and discussions.
          required: true
