version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "[chore]"
  - package-ecosystem: "pip"
    directory: "/reference-implementation/src/ski_model"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "maintenance"]
  - package-ecosystem: "pip"
    directory: "/reference-implementation/src/sidecar"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "maintenance"]
  - package-ecosystem: "pip"
    directory: "/tools/kg-extractor"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "maintenance"]
  - package-ecosystem: "pip"
    directory: "/tools/kg-validator"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "maintenance"]
  - package-ecosystem: "pip"
    directory: "/tools/ski-model-deploy"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "maintenance"]
  - package-ecosystem: "pip"
    directory: "/tools/audit-ledger"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "maintenance"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "maintenance"]
  - package-ecosystem: "docker"
    directory: "/reference-implementation"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "maintenance"]
