version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["deps", "python"]
    commit-message:
      prefix: "[chore]"
  - package-ecosystem: "pip"
    directory: "/reference-implementation/src/ski_model"
    schedule:
      interval: "weekly"
    labels: ["deps", "ski-model"]
  - package-ecosystem: "pip"
    directory: "/reference-implementation/src/sidecar"
    schedule:
      interval: "weekly"
    labels: ["deps", "sidecar"]
  - package-ecosystem: "pip"
    directory: "/tools/kg-extractor"
    schedule:
      interval: "weekly"
    labels: ["deps", "kg-extractor"]
  - package-ecosystem: "pip"
    directory: "/tools/kg-validator"
    schedule:
      interval: "weekly"
    labels: ["deps", "kg-validator"]
  - package-ecosystem: "pip"
    directory: "/tools/ski-model-deploy"
    schedule:
      interval: "weekly"
    labels: ["deps", "ski-model-deploy"]
  - package-ecosystem: "pip"
    directory: "/tools/audit-ledger"
    schedule:
      interval: "weekly"
    labels: ["deps", "audit-ledger"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["deps", "github-actions"]
  - package-ecosystem: "docker"
    directory: "/reference-implementation"
    schedule:
      interval: "weekly"
    labels: ["deps", "docker"]
