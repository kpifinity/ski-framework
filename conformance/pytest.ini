[pytest]
markers =
    provenance: Level 1 — every verdict carries verifier-checked provenance
    durability: Level 2 — provenance is signed, reproducible, and audit-chained
    sovereignty: Level 3 — operable air-gapped, tamper-evident, end-to-end signed
    requires_live_deployment: Test requires a running SKI Model endpoint
    requires_ledger: Test requires a Postgres ledger DSN
testpaths = .
addopts = --strict-markers
