# Pre-commit hooks for the SKI Framework.
#
# Install once per clone:
#   pip install pre-commit
#   pre-commit install
#
# Then every commit is checked locally; CI runs the same hooks.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]   # mkdocs.yml uses Python tags
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.2
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic==2.6.3
          - sqlalchemy==2.0.27
          - types-PyYAML==6.0.12.20240311
          - types-requests==2.31.0.20240406
        # Only run mypy strict on the runtime packages; CLI tools are
        # checked at the package level by CI but not blocked at commit.
        files: |
          (?x)^(
            reference-implementation/src/(symbolic_evaluator|telemetry_buffer|ski_model|tag_registry)/.*\.py
            |tools/audit-ledger/src/audit_ledger/canonical\.py
          )$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
